server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: qovf-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 本地开发库（WSL2 Docker MySQL）。生产请用环境变量覆盖，切勿提交真实密码
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:qovf}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:qovf_root_2026}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置（密钥仅本地默认，生产必须用环境变量覆盖）
jwt:
  secret: ${JWT_SECRET:qovf-dev-secret-key-please-override-in-prod-0123456789}
  access-expire-minutes: ${JWT_ACCESS_EXPIRE:120}
  refresh-expire-days: ${JWT_REFRESH_EXPIRE:7}
